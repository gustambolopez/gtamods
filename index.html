<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>GTA Mods - Fullscreen</title>
    <style>
        /* Force the game to fill the entire screen */
        html, body {
            padding: 0;
            margin: 0;
            overflow: hidden;
            height: 100%;
            width: 100%;
            background-color: #000;
        }
        #unity-container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #unity-canvas {
            width: 100% !important;
            height: 100% !important;
            display: block;
        }
        #loading-cover {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        #unity-loading-bar { width: 50%; }
        #unity-progress-bar-empty { width: 100%; height: 20px; background: #333; border-radius: 10px; }
        #unity-progress-bar-full { height: 100%; background: #0ff; width: 0%; border-radius: 10px; transition: width 0.2s; }
    </style>
</head>
<body>

    <div id="unity-container">
        <canvas id="unity-canvas" tabindex="-1"></canvas>
    </div>

    <div id="loading-cover">
        <div id="unity-loading-bar">
            <div id="unity-progress-bar-empty">
                <div id="unity-progress-bar-full"></div>
            </div>
        </div>
    </div>

    <script>
        const buildUrl = "https://cdn.jsdelivr.net/gh/centerclassroom/mc55@main/Build";
        const loaderUrl = buildUrl + "/bb0d9ecdb05db3e84da20bd14a4f84dc.loader.js";
        const config = {
            dataUrl: buildUrl + "/cffd2fddc93a5e3bb5ff56ac3bb5a297.data.br",
            frameworkUrl: buildUrl + "/c39bf58f300a834e953a20c745c5e5f2.framework.js",
            codeUrl: buildUrl + "/d649f30ffe591eef6765ee27d7fc980f.wasm.br",
            streamingAssetsUrl: "StreamingAssets",
            companyName: "DefaultCompany",
            productName: "GtaArcade",
            productVersion: "0.1"
        };

        const canvas = document.querySelector("#unity-canvas");
        const loadingCover = document.querySelector("#loading-cover");
        const progressBarFull = document.querySelector("#unity-progress-bar-full");

        // Merge split files logic
        async function mergeFileParts(fileUrl, partCount) {
            const parts = [];
            for (let i = 0; i < partCount; i++) {
                const response = await fetch(`${fileUrl}.part${i}`);
                parts.push(await response.arrayBuffer());
            }
            const totalSize = parts.reduce((sum, part) => sum + part.byteLength, 0);
            const merged = new Uint8Array(totalSize);
            let offset = 0;
            for (const part of parts) {
                merged.set(new Uint8Array(part), offset);
                offset += part.byteLength;
            }
            return URL.createObjectURL(new Blob([merged], { type: 'application/octet-stream' }));
        }

        // Initialize Unity
        const script = document.createElement("script");
        script.src = loaderUrl;
        script.onload = async () => {
            try {
                config.dataUrl = await mergeFileParts(config.dataUrl, 4);
                config.codeUrl = await mergeFileParts(config.codeUrl, 4);
                
                createUnityInstance(canvas, config, (progress) => {
                    progressBarFull.style.width = `${100 * progress}%`;
                }).then((unityInstance) => {
                    loadingCover.style.display = "none";
                });
            } catch (err) {
                console.error("Unity Load Error:", err);
            }
        };
        document.body.appendChild(script);

        // Auto-focus game
        window.addEventListener('pointerdown', () => canvas.focus());
    </script>
</body>
</html>
